# Release workflow: builds, tests, signs, notarizes, packages, and publishes
# a GitHub prerelease when a v* tag is pushed.
#
# Required repository secrets (see docs/RELEASING.md):
#   MACOS_CERTIFICATE_P12        base64 Developer ID Application cert + key
#   MACOS_CERTIFICATE_PASSWORD   password of the .p12
#   CODESIGN_IDENTITY            e.g. "Developer ID Application: Name (TEAMID)"
#   NOTARY_APPLE_ID              Apple ID used for notarytool
#   NOTARY_TEAM_ID               Developer team ID
#   NOTARY_PASSWORD              app-specific password for notarytool
#
# Without these secrets the workflow still produces UNSIGNED artifacts and
# marks the release as a draft, so maintainers can't accidentally publish
# unsigned builds.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
      NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
      NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_16* | sort -V | tail -1)"

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Test
        run: swift test

      - name: Import signing certificate
        env:
          CERT_P12: ${{ env.MACOS_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ env.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "$CERT_P12" ]]; then
            echo "Skipping certificate import; no signing certificate configured."
            exit 0
          fi
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "$CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security import cert.p12 -k $KEYCHAIN -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN
          rm cert.p12

      - name: Build app bundle
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
        run: scripts/make-app.sh

      - name: Notarize and staple
        env:
          NOTARY_APPLE_ID: ${{ env.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ env.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ env.NOTARY_PASSWORD }}
        run: |
          if [[ -z "$NOTARY_APPLE_ID" ]]; then
            echo "Skipping notarization; no App Store Connect credentials configured."
            exit 0
          fi
          ditto -c -k --keepParent dist/Glance.app dist/notarize.zip
          xcrun notarytool submit dist/notarize.zip \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple dist/Glance.app
          rm dist/notarize.zip

      - name: Package DMG + ZIP + checksums
        run: scripts/make-dmg.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Unsigned builds stay drafts; signed+notarized builds publish.
          draft: ${{ env.CODESIGN_IDENTITY == '' }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/Glance-*.dmg
            dist/Glance-*.zip
            dist/checksums-*.sha256
